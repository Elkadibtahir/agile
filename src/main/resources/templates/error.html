<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Erreur | TeamTrack</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<nav th:replace="~{fragments/navbar :: navbar}"></nav>
<main class="container">
    <div class="error-page">
        <div class="error-code" th:text="${code ?: '?'}">404</div>
        <h2 th:text="${titre ?: 'Erreur'}">Erreur</h2>
        <p class="text-muted" th:text="${message ?: 'Une erreur est survenue.'}">Message</p>
        <div style="margin-top:2rem; display:flex; gap:1rem; justify-content:center; flex-wrap:wrap">
            <a th:href="@{/dashboard}" class="btn btn-primary">🏠 Retour au dashboard</a>
            <a href="javascript:history.back()" class="btn btn-outline">← Retour</a>
        </div>
    </div>
</main>
</body>
</html>
