<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Inscription | TeamTrack</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body class="auth-body">
<div class="auth-card">

    <div class="auth-logo">🚀 TeamTrack</div>
    <p class="auth-subtitle">Créer un compte</p>

    <!-- Erreur globale (username/email déjà pris) -->
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <!--
      th:object="${registerDTO}" : lie le formulaire au DTO
      th:field="*{username}"     : lie chaque champ à sa propriété
      th:errors="*{username}"    : affiche les erreurs de validation du champ
    -->
    <form th:action="@{/auth/register}" method="post" th:object="${registerDTO}" novalidate>

        <div class="form-group">
            <label>Nom complet</label>
            <input type="text" th:field="*{fullName}" class="form-control"
                   th:classappend="${#fields.hasErrors('fullName')} ? ' input-error'"
                   placeholder="Jean Dupont"/>
            <span th:if="${#fields.hasErrors('fullName')}"
                  th:errors="*{fullName}" class="field-error"></span>
        </div>

        <div class="form-group">
            <label>Nom d'utilisateur</label>
            <input type="text" th:field="*{username}" class="form-control"
                   th:classappend="${#fields.hasErrors('username')} ? ' input-error'"
                   placeholder="jean_dupont"/>
            <span th:if="${#fields.hasErrors('username')}"
                  th:errors="*{username}" class="field-error"></span>
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" th:field="*{email}" class="form-control"
                   th:classappend="${#fields.hasErrors('email')} ? ' input-error'"
                   placeholder="jean@email.com"/>
            <span th:if="${#fields.hasErrors('email')}"
                  th:errors="*{email}" class="field-error"></span>
        </div>

        <div class="form-group">
            <label>Mot de passe</label>
            <input type="password" th:field="*{password}" class="form-control"
                   th:classappend="${#fields.hasErrors('password')} ? ' input-error'"
                   placeholder="Min. 8 caractères, 1 majuscule, 1 chiffre"/>
            <span th:if="${#fields.hasErrors('password')}"
                  th:errors="*{password}" class="field-error"></span>
            <!-- Indicateur de force du mot de passe -->
            <div class="password-strength" id="strength-bar" style="display:none">
                <div class="strength-fill" id="strength-fill"></div>
            </div>
            <span class="password-hint" id="strength-label"></span>
        </div>

        <button type="submit" class="btn btn-primary" style="width:100%">
            Créer mon compte
        </button>
    </form>

    <p class="auth-footer">
        Déjà un compte ? <a th:href="@{/auth/login}">Se connecter</a>
    </p>
</div>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
