<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Connexion | TeamTrack</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body class="auth-body">
<div class="auth-card">

    <div class="auth-logo">🚀 TeamTrack</div>
    <p class="auth-subtitle">Gestion de projets Agile</p>

    <!-- Message d'erreur -->
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
    <!-- Message de succès -->
    <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>

    <form th:action="@{/auth/login}" method="post">
        <div class="form-group">
            <label>Nom d'utilisateur</label>
            <input type="text" name="username" class="form-control"
                   placeholder="votre_username" required autofocus/>
        </div>
        <div class="form-group">
            <label>Mot de passe</label>
            <input type="password" name="password" class="form-control"
                   placeholder="••••••••" required/>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%">
            Se connecter
        </button>
    </form>

    <p class="auth-footer">
        Pas de compte ? <a th:href="@{/auth/register}">S'inscrire</a>
    </p>
</div>
</body>
</html>
