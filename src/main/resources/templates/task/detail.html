<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title th:text="${task.title} + ' | TeamTrack'">Tâche</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<nav th:replace="~{fragments/navbar :: navbar}"></nav>
<main class="container">

    <div class="breadcrumb" style="margin-bottom:1rem">
        <a th:href="@{/projects}">Projets</a> /
        <a th:href="@{/projects/{id}(id=${project.id})}" th:text="${project.name}">Projet</a> /
        <span th:text="${task.title}">Tâche</span>
    </div>

    <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>

    <div class="task-layout">

        <!-- Infos tâche -->
        <div class="card">
            <div style="display:flex; justify-content:space-between; align-items:flex-start; flex-wrap:wrap; gap:0.5rem; margin-bottom:1rem">
                <h2 th:text="${task.title}">Titre</h2>
                <div style="display:flex; gap:6px; flex-wrap:wrap">
                    <span th:class="'priority-badge priority-' + ${task.priority.name().toLowerCase()}"
                          th:text="${task.priority}">M</span>
                    <span th:class="'status-badge status-' + ${task.status.name().toLowerCase()}"
                          th:text="${task.status}">TODO</span>
                    <span th:if="${task.overdue}" class="badge badge-danger">⚠️ En retard</span>
                </div>
            </div>

            <p th:if="${task.description}" th:text="${task.description}"
               class="text-muted" style="margin-bottom:1rem; line-height:1.7"></p>

            <div style="display:grid; grid-template-columns:repeat(3,1fr); gap:0.75rem; background:#f8fafc; padding:1rem; border-radius:8px; margin-bottom:1.2rem; font-size:0.85rem">
                <div>
                    <div class="text-muted" style="font-size:0.75rem; margin-bottom:2px">Assigné à</div>
                    <div th:text="${task.assignee != null ? (task.assignee.fullName != null ? task.assignee.fullName : task.assignee.username) : 'Non assigné'}">-</div>
                </div>
                <div>
                    <div class="text-muted" style="font-size:0.75rem; margin-bottom:2px">Échéance</div>
                    <div th:text="${task.dueDate != null ? task.dueDate : 'Aucune'}">-</div>
                </div>
                <div>
                    <div class="text-muted" style="font-size:0.75rem; margin-bottom:2px">Créée le</div>
                    <div th:text="${#temporals.format(task.createdAt, 'dd/MM/yyyy')}">-</div>
                </div>
            </div>

            <!-- Changer statut -->
            <div style="margin-bottom:1.2rem">
                <strong style="display:block; margin-bottom:0.5rem">Changer le statut :</strong>
                <div style="display:flex; gap:0.5rem; flex-wrap:wrap">
                    <form th:each="s : ${statuses}"
                          th:action="@{/projects/{pid}/tasks/{tid}/status(pid=${project.id},tid=${task.id})}"
                          method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <input type="hidden" name="status" th:value="${s}"/>
                        <button type="submit" class="btn btn-sm"
                                th:class="${task.status == s} ? 'btn btn-sm btn-primary' : 'btn btn-sm btn-outline'"
                                th:text="${s}">S</button>
                    </form>
                </div>
            </div>

            <!-- Modifier tâche -->
            <details style="border-top:1px solid #e2e8f0; padding-top:1rem">
                <summary class="btn btn-outline btn-sm" style="cursor:pointer; list-style:none">✏️ Modifier cette tâche</summary>
                <form th:action="@{/projects/{pid}/tasks/{tid}/edit(pid=${project.id},tid=${task.id})}"
                      method="post" style="margin-top:1rem">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <div class="form-group">
                        <label>Titre</label>
                        <input type="text" name="title" class="form-control" th:value="${task.title}" required/>
                    </div>
                    <div class="form-group">
                        <label>Description</label>
                        <textarea name="description" class="form-control" rows="3" th:text="${task.description}"></textarea>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Priorité</label>
                            <select name="priority" class="form-control">
                                <option th:each="p : ${priorities}" th:value="${p}" th:text="${p}"
                                        th:selected="${task.priority == p}">P</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Statut</label>
                            <select name="status" class="form-control">
                                <option th:each="s : ${statuses}" th:value="${s}" th:text="${s}"
                                        th:selected="${task.status == s}">S</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Échéance</label>
                            <input type="date" name="dueDate" class="form-control" th:value="${task.dueDate}"/>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Assigner à</label>
                        <select name="assigneeId" class="form-control">
                            <option value="">Non assigné</option>
                            <option th:each="m : ${project.members}"
                                    th:value="${m.user.id}"
                                    th:text="${m.user.fullName != null ? m.user.fullName : m.user.username}"
                                    th:selected="${task.assignee != null and task.assignee.id == m.user.id}">User</option>
                        </select>
                    </div>
                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary">Sauvegarder</button>
                    </div>
                </form>
                <!-- Supprimer séparément -->
                <form th:action="@{/projects/{pid}/tasks/{tid}/delete(pid=${project.id},tid=${task.id})}"
                      method="post" style="margin-top:0.75rem"
                      onsubmit="return confirm('Supprimer cette tâche définitivement ?')">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button type="submit" class="btn btn-danger btn-sm">🗑️ Supprimer la tâche</button>
                </form>
            </details>
        </div>

        <!-- Commentaires -->
        <div class="card">
            <h3 style="margin-bottom:1rem">💬 Commentaires (<span th:text="${comments.size()}">0</span>)</h3>

            <form th:action="@{/projects/{pid}/tasks/{tid}/comments(pid=${project.id},tid=${task.id})}"
                  method="post" style="margin-bottom:1.5rem">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <textarea name="content" class="form-control" rows="3"
                          placeholder="Ajouter un commentaire..." required></textarea>
                <button type="submit" class="btn btn-primary btn-sm" style="margin-top:0.5rem">
                    Commenter
                </button>
            </form>

            <div th:if="${comments.isEmpty()}" class="text-muted" style="text-align:center; padding:1rem">
                Aucun commentaire.
            </div>

            <div th:each="comment : ${comments}" class="comment-item">
                <div style="display:flex; align-items:center; gap:0.6rem; margin-bottom:0.4rem; flex-wrap:wrap">
                    <span style="font-weight:600; font-size:0.85rem"
                          th:text="${comment.author.fullName != null ? comment.author.fullName : comment.author.username}">User</span>
                    <span class="text-muted" style="font-size:0.78rem"
                          th:text="${#temporals.format(comment.createdAt, 'dd/MM/yyyy HH:mm')}">date</span>
                    <span style="margin-left:auto"
                          th:text="${comment.sentiment == 'POSITIVE'} ? '😊' : ${comment.sentiment == 'NEGATIVE'} ? '😟' : '😐'">😐</span>
                    <span class="badge"
                          th:class="${comment.sentiment == 'POSITIVE'} ? 'badge badge-success' : ${comment.sentiment == 'NEGATIVE'} ? 'badge badge-danger' : 'badge'"
                          style="font-size:0.7rem" th:text="${comment.sentiment}">NEUTRAL</span>
                </div>
                <p th:text="${comment.content}" style="font-size:0.88rem; margin-bottom:0.4rem; line-height:1.6">Contenu</p>
                <form th:if="${comment.author.username == user.username}"
                      th:action="@{/projects/{pid}/tasks/{tid}/comments/{cid}/delete(pid=${project.id},tid=${task.id},cid=${comment.id})}"
                      method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button type="submit" class="btn btn-xs btn-danger"
                            onclick="return confirm('Supprimer ce commentaire ?')">Supprimer</button>
                </form>
            </div>
        </div>

    </div>
</main>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
