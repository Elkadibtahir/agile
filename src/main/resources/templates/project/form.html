<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Projet | TeamTrack</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<nav th:replace="~{fragments/navbar :: navbar}"></nav>
<main class="container">
    <div class="page-header">
        <h2 th:text="${project != null} ? 'Modifier le projet' : 'Nouveau projet'">Projet</h2>
    </div>
    <div class="card form-card">
        <form th:action="${project != null} ? @{/projects/{id}/edit(id=${project.id})} : @{/projects/new}"
              method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <div class="form-group">
                <label>Nom du projet *</label>
                <input type="text" name="name" class="form-control"
                       th:value="${project?.name}" placeholder="Mon super projet" required/>
            </div>
            <div class="form-group">
                <label>Description</label>
                <textarea name="description" class="form-control" rows="3"
                          th:text="${project?.description}" placeholder="Décrivez votre projet..."></textarea>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Date de début</label>
                    <input type="date" name="startDate" class="form-control" th:value="${project?.startDate}"/>
                </div>
                <div class="form-group">
                    <label>Date de fin</label>
                    <input type="date" name="endDate" class="form-control" th:value="${project?.endDate}"/>
                </div>
            </div>
            <div class="form-actions">
                <a th:href="@{/projects}" class="btn btn-outline">Annuler</a>
                <button type="submit" class="btn btn-primary"
                        th:text="${project != null} ? 'Mettre à jour' : 'Créer le projet'">Créer</button>
            </div>
        </form>
    </div>
</main>
</body>
</html>
