spring.application.name=TeamTrack
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=testDB;encrypt=true;trustServerCertificate=true
spring.datasource.username=sa
spring.datasource.password=1234
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# JPA - Hibernate crée/met à jour les tables automatiquement

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=true

# Thymeleaf
spring.thymeleaf.cache=false

# Java 21 Virtual Threads
spring.threads.virtual.enabled=true

server.port=8081

# ADDED: Gmail SMTP config for EmailService
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=tonmail@gmail.com
spring.mail.password=ton_app_password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.mail.from=TeamTrack <tonmail@gmail.com>

# ADDED: pagination sizes, readable from controllers via @Value
app.pagination.tasks-per-page=10
app.pagination.projects-per-page=9

# File Upload Configuration
app.upload.dir=uploads/
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB









